<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="./style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="banner">
        <h2>Cards Versus Tolerance</h2>
    </div>
    <div>
        <h1>Get Drunk</h1>
        <p>Draw a card and complete the task or drink</p>
        <div id="language-menu">
            <h3>Select Language/Elegir Idioma</h3>
            <button id="english-btn">English</button>
            <button id="spanish-btn">Español</button>
        </div>
        <div id="name-select">
            <h2>What is your name?</h2>

            <form id="name-form">
                <input
                    type="text"
                    id="input-name"
                    placeholder="Enter your name"
                    maxlength="20"
                    required
                >

                <button type="submit" id="name-btn">Continue</button>
            </form>
        </div>
        <div id="lobby-screen" style="display: none;">
            <h1>Lobby</h1>
            <h2 id="room-code-display"></h2>
            <h3>Players</h3>
            <ul id="player-list"></ul>
            <button id="start-game-btn">Start Game</button>
        </div>
        <div id="main-menu">
            <h2 id="player-name-display"></h2>
            <button id="create-room-btn">Create Room</button>
            <button id="join-room-1-btn">Join Room</button>
            <button id="how-to-play-btn">How to Play</button>
        </div>
        <div id="join-room-section">
            <h2>Join a Room</h2>

            <input
                type="text"
                id="room-input"
                placeholder="Enter room code"
                maxlength="4"
            >

            <button id="join-room-2-btn">Join Room</button>

            <p id="join-room-status"></p>
        </div>
        <button id="restart-game-btn" onClick="restartGame()">RESTART GAME</button>
        <div id="card-section">
            <div id="card">
            <h2 id="turn-display" style="display:block;"></h2>
                <p id="card-content"><!--Card content goes here--></p>
                <button id="nextCard">OK</button>
            </div>
        </div>
        <div id="saved-cards-section">
            <h3 id="saved-card-title">
                Saved Cards 
            </h3>
            <div id="saved-cards">

            </div>
        </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="./script.js"></script>
</body>
</html>
