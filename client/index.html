<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="./style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="banner">
        <h2>Cards Versus Tolerance</h2>
    </div>
    <div>
        <h1>Get Drunk</h1>
        <p>Draw a card and complete the task or drink</p>
        <div id="language-menu">
            <h3>Select Language/Elegir Idioma</h3>
            <button id="english-btn">English</button>
            <button id="spanish-btn">Español</button>
        </div>
        <div id="name-select">
            <h2>What is your name?</h2>

            <form id="name-form">
                <input
                    type="text"
                    id="input-name"
                    placeholder="Enter your name"
                    maxlength="20"
                    required
                >

                <button type="submit" id="name-btn">Continue</button>
            </form>
        </div>
        <div id="main-menu">
            <h2 id="player-name-display"></h2>
            <button id="create-room">Create Room</button>
            <button id="join-room">Join Room</button>
        </div>
        <button id="restart-game-btn" onClick="restartGame()">RESTART GAME</button>
        <div id="card-section">
            <div id="card">
                <p id="card-content"><!--Card content goes here--></p>
                <button id="nextCard" onClick="showNextCard()">OK</button>
            </div>
        </div>
        <div id="saved-cards-section">
            <h3 id="saved-card-title">
                Saved Cards 
            </h3>
            <div id="saved-cards">

            </div>
        </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="./script.js"></script>
</body>
</html>
